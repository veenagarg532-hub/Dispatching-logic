services:
  # ── Backend (FastAPI / Python) ─────────────────────────────────────────────
  - type: web
    name: dispatching-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"

  # ── Frontend (React/Vite static site) ─────────────────────────────────────
  - type: web
    name: dispatching-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://dispatching-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
